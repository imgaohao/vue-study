<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>更新问题</title>
    <script src="../js/vue.js"></script>
</head>

<body>
    <div id="app">
        <ul>
            <li v-for="item in items" :key="item.id">{{ item.name }} - {{ item.value }}</li>
        </ul>
    </div>

    <script>
        let app = new Vue({
            el: '#app',
            data: {
                items: [
                    { id: 1, name: 'a', value: 5 },
                    { id: 2, name: 'b', value: 3 },
                    { id: 3, name: 'c', value: 8 },
                    { id: 4, name: 'd', value: 1 },
                    { id: 5, name: 'e', value: 6 }
                ],
            },
        });
    </script>
</body>
</html>
