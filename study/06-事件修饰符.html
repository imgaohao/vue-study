<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>事件修饰符</title>
    <script src="../js/vue.js"></script>
    <style>
        .list {
            height: 100px;
            overflow: auto;
            border: 1px solid #ccc;
        }
        .list li {
            height: 300px;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>{{ msg }}</h1>
        <!-- 
        事件修饰符：
        .prevent 阻止默认事件
        .stop 阻止事件冒泡
        .once 事件只触发一次
        .capture 事件捕获阶段触发
        .self 事件只触发当前元素
        .passive 事件被动触发
        -->
        <!-- 阻止默认事件 -->
        <a href="https://www.baidu.com" @click.prevent="changeMsg2('hello', $event)">改变msg</a>
        <!-- 阻止事件冒泡 -->
        <div @click="changeMsg2('hello', $event)">
            <button @click.stop="changeMsg2('hello', $event)">改变msg</button>
        </div>
        <!-- 事件只触发一次 -->
        <button @click.once="changeMsg2('hello', $event)">改变msg</button>
        <!-- 
        事件捕获阶段触发，捕获阶段是事件从外向内传递，冒泡阶段是事件从内向外外传递
        捕获阶段先触发，冒泡阶段后触发，默认是冒泡阶段触发
        -->
        <div @click.capture="changeMsg2('hello', $event)">
            <button @click="changeMsg2('hello', $event)">改变msg</button>
        </div>
        <!-- 事件只触发当前元素 -->
        <div @click.self="changeMsg2('hello', $event)">
            <button @click="changeMsg2('hello', $event)">改变msg</button>
        </div>
        <!-- 事件被动触发 -->
        <!-- @wheel是鼠标滚轮事件，当鼠标滚轮滚动时触发会触发该事件 -->
        <!-- @scroll是滚动条事件，当滚动条滚动时触发会触发该事件 -->
        <!-- 不加passive修饰符，先触发longTimeExcute方法，可以调用preventDefault方法阻止默认事件，再触发事件默认行为 -->
        <!-- 加了passive修饰符，先触发事件默认行为，再触发longTimeExcute方法，调用preventDefault方法没有效果 -->
        <ul @wheel.passive="longTimeExcute" class="list">
            <li>列表项1</li>
            <li>列表项2</li>
            <li>列表项3</li>
        </ul>

        <!-- 修饰符可以组合使用 -->
        <button @click.prevent.stop="changeMsg2('hello', $event)">改变msg</button>
    </div>

    <script>
        let app = new Vue({
            el: '#app',
            data: {
                msg: 'hello vue'
            },
            methods: {
                changeMsg2(data, event) {
                    this.msg = data
                },
                longTimeExcute() {
                    for(let i = 0; i < 1000000; i++) {
                        console.log(i)
                    }
                }
            }
        })
    </script>
</body>
</html>
