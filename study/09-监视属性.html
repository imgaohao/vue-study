<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>监视属性</title>
    <script src="../js/vue.js"></script>
</head>

<body>
    <div id="app">
        <div>
            今天天气很 {{ info }}
            <button @click="changeWeather">切换天气</button>
            <button @click="isHot = !isHot">切换天气</button>
        </div>
        <div>
            {{ numbers.a }}
            <button @click="numbers.a++">增加a</button>
        </div>
        <div>
            {{ numbers.b }}
            <button @click="numbers.b++">增加b</button>
        </div>
    </div>

    <script>
        let app = new Vue({
            el: '#app',
            data: {
                isHot: true,
                numbers: {
                    a: 1,
                    b: 2
                }
            },
            methods: {
                changeWeather() {
                    this.isHot = !this.isHot
                }
            },
            computed: {
                info() {
                    return this.isHot ? '热' : '冷'
                }
            },
            watch: {
                //监听isHot属性的变化,当isHot属性变化时,会触发回调函数,传入新的值和旧的值
                isHot: {
                    handler(newVal, oldVal) {
                        console.log(newVal, oldVal)
                    },
                    // immediate: true 初始化时,会立即执行回调函数,传入初始值和undefined
                    immediate: true
                },
                //简写方式
                // isHot(newVal, oldVal) {
                //     console.log(newVal, oldVal)
                // },

                //也可以监听计算属性的变化
                info: {
                    handler(newVal, oldVal) {
                        console.log(newVal, oldVal)
                    },
                },

                //监视深层属性的变化，指定层次属性
                "numbers.a": {
                    handler(newVal, oldVal) {
                        console.log(newVal, oldVal)
                    },
                },

                //监视深层属性的变化，deep: true 表示监视多层全部属性
                "numbers": {
                    deep: true,
                    //newVal和oldVal都是引用同一个对象，所以是一样的，都是最新的值
                    //如果要读取旧值，需要每次将newVal值拷贝存储下来
                    handler(newVal, oldVal) {
                        console.log(newVal, oldVal)

                        console.log('新值:', newVal, '旧值:', this.oldNumbers)

                        // 更新快照，为下次变化做准备
                        this.oldNumbers = JSON.parse(JSON.stringify(newVal))
                    },
                    immediate: true  // 初始化时保存初始值
                }
            }
        })

        //后续监听属性的变化
        app.$watch('isHot', {
            handler(newVal, oldVal) {
                console.log(newVal, oldVal)
            },
        })
        //简写方式
        app.$watch('isHot', function (newVal, oldVal) {
            console.log(newVal, oldVal)
        })
    </script>
</body>
</html>
