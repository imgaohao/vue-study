<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>v-text</title>
    <style>
        [v-cloak] {
            display: none;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- 插值语法 -->
        <p>{{ message }}</p>

        <!-- v-text（会覆盖元素内容） -->
        <!-- v-text 避免闪烁（防止 {{ }} 在 Vue 加载前显示） -->
        <p v-text="message"></p>
        <!-- v-cloak 通过 CSS 样式临时隐藏元素，避免闪烁问题，加载时移除属性 -->
        <p v-cloak>{{ message }}</p>

        <!-- 输出 HTML 文本 -->
        <p v-text="htmlContent"></p>
        <p>{{ htmlContent }}</p>

        <!-- v-html（保留 HTML 结构） -->
        <p v-html="htmlContent"></p>

        <script src="../js/vue.js"></script>
    </div>

    <script>
        let app = new Vue({
            el: '#app',
            data: {
                message: 'Hello Vue!',
                htmlContent: '<b>这是加粗的文字</b>',
            }
        });
    </script>
</body>
</html>
